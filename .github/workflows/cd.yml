name: CD

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    name: Publish Docker images to GHCR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (API)
        id: meta_api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/notes-app-api
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./backend/NotesApp.API
          file: ./backend/NotesApp.API/Dockerfile
          push: true
          tags: ${{ steps.meta_api.outputs.tags }}
          labels: ${{ steps.meta_api.outputs.labels }}

      - name: Extract metadata (frontend)
        id: meta_frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/notes-app-frontend
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL || 'http://localhost:5000/api' }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Docker-образы

            - `${{ env.REGISTRY }}/${{ github.repository_owner }}/notes-app-api:${{ github.ref_name }}`
            - `${{ env.REGISTRY }}/${{ github.repository_owner }}/notes-app-frontend:${{ github.ref_name }}`

            ## Деплой на сервер

            ```bash
            export APP_VERSION=${{ github.ref_name }}
            export GHCR_OWNER=${{ github.repository_owner }}
            docker compose -f docker-compose.release.yml pull
            docker compose -f docker-compose.release.yml up -d
            ```

            Подробнее: [SETUP_INSTRUCTIONS.md](./SETUP_INSTRUCTIONS.md)

  deploy:
    name: Deploy to server (optional)
    runs-on: ubuntu-latest
    needs: publish
    if: ${{ secrets.DEPLOY_HOST != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH || '/opt/notes-app' }}
            export APP_VERSION=${{ github.ref_name }}
            export GHCR_OWNER=${{ github.repository_owner }}
            docker compose -f docker-compose.release.yml pull
            docker compose -f docker-compose.release.yml up -d
