name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Backend build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
          cache: true
          cache-dependency-path: |
            backend/NotesApp.API/NotesApp.API.csproj
            backend/NotesApp.API.Tests/NotesApp.API.Tests.csproj

      - name: Restore
        run: dotnet restore 24_3_MSGS.sln

      - name: Build
        run: dotnet build 24_3_MSGS.sln --no-restore -c Release

      - name: Test
        run: dotnet test backend/NotesApp.API.Tests/NotesApp.API.Tests.csproj --no-build -c Release --verbosity normal

  frontend:
    name: Frontend lint, test & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Test
        working-directory: frontend
        run: npm run test

      - name: Build
        working-directory: frontend
        run: npm run build

  docker:
    name: Docker images build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: ./backend/NotesApp.API
          file: ./backend/NotesApp.API/Dockerfile
          push: false
          tags: notes-app-api:ci

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: notes-app-frontend:ci
          build-args: |
            VITE_API_BASE_URL=http://localhost:5000/api
