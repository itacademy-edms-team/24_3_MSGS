services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-msgs}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-msgs}"
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: ./backend/NotesApp.API
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-msgs};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      Jwt__Issuer: NotesApp
      Jwt__Audience: NotesAppClient
      Jwt__SecretKey: super_secret_dev_key_1234567890!@#%$$
      Jwt__AccessTokenLifetimeMinutes: 60
      Smtp__Host: smtp.gmail.com
      Smtp__Port: 587
      Smtp__UseSsl: "true"
      Smtp__FromName: Notes App
      Smtp__FromEmail: ${Smtp__FromEmail:-}
      Smtp__AppPassword: ${Smtp__AppPassword:-}
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5000/api}
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  pgdata:
