# Продакшн-запуск из образов GHCR (после релиза v*).
# Перед запуском: docker login ghcr.io -u USER -p TOKEN

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-msgs}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-msgs}"
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: ghcr.io/${GHCR_OWNER:?GHCR_OWNER required}/notes-app-api:${APP_VERSION:?APP_VERSION required}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-msgs};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD}
      Jwt__Issuer: NotesApp
      Jwt__Audience: NotesAppClient
      Jwt__SecretKey: ${JWT_SECRET_KEY:?JWT_SECRET_KEY required}
      Jwt__AccessTokenLifetimeMinutes: 60
      Smtp__Host: smtp.gmail.com
      Smtp__Port: 587
      Smtp__UseSsl: "true"
      Smtp__FromName: Notes App
      Smtp__FromEmail: ${Smtp__FromEmail:-}
      Smtp__AppPassword: ${Smtp__AppPassword:-}
    ports:
      - "${API_PORT:-5000}:5000"

  frontend:
    image: ghcr.io/${GHCR_OWNER}/notes-app-frontend:${APP_VERSION}
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${FRONTEND_PORT:-8080}:80"

volumes:
  pgdata:
